# KidsTub — пример vhost для Nginx с HTTPS (Let's Encrypt / Certbot).
#
# 1. Замените example.com на ваш домен (например, командой):
#      sed -i 's/example.com/ваш-домен/g' stream.example.com.conf
# 2. Скорректируйте путь root и версию PHP-FPM сокета при необходимости.
# 3. Скопируйте в /etc/nginx/sites-available/ и включите:
#      sudo cp stream.example.com.conf /etc/nginx/sites-available/kidstub
#      sudo ln -sfn /etc/nginx/sites-available/kidstub /etc/nginx/sites-enabled/kidstub
# 4. Выпустите сертификат: sudo certbot --nginx -d example.com
#    Certbot сам добавит блоки ssl_certificate и редирект с 80 порта.

server {
    server_name example.com;

    root /home/web_deploy/web/public/stream/public/;
    index index.php index.html index.htm;

    charset utf-8;
    server_tokens off;

    # Загрузка крупных MP4 (согласовано с post_max_size=5200M в PHP-FPM).
    client_max_body_size 5200M;
    client_body_timeout 3600s;
    send_timeout 3600s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # HLS-плейлисты и сегменты + обложки отдаёт напрямую Nginx, минуя PHP.
    location ^~ /media/ {
        try_files $uri =404;
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
            text/vtt vtt;
            image/jpeg jpg jpeg;
        }
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    location ^~ /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param APP_URL https://example.com;
        # Веб-процесс не поднимает воркер — им управляет systemd (stream-worker).
        fastcgi_param AUTO_START_WORKER 0;
        fastcgi_read_timeout 3600s;
    }

    location ~ /\. {
        deny all;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    # Блоки ниже добавит Certbot после выпуска сертификата.
    # listen [::]:443 ssl ipv6only=on;
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    listen 80;
    listen [::]:80;
}

# После выпуска сертификата Certbot заменит блок 80 порта редиректом на HTTPS:
#
# server {
#     if ($host = example.com) {
#         return 301 https://$host$request_uri;
#     }
#     listen 80;
#     listen [::]:80;
#     server_name example.com;
#     return 404;
# }
