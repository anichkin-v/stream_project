server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /home/web_deploy/web/public/stream/public;
    index index.php;

    client_max_body_size 5200M;
    client_body_timeout 3600s;
    send_timeout 3600s;

    charset utf-8;
    sendfile on;
    tcp_nopush on;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # HLS и обложки отдаются непосредственно Nginx, минуя PHP.
    location ^~ /media/ {
        try_files $uri =404;
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
            text/vtt vtt;
            image/jpeg jpg jpeg;
        }
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    location ^~ /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # В public исполняется только единая точка входа.
    location = /index.php {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param APP_URL $scheme://$http_host;
        fastcgi_param AUTO_START_WORKER 0;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_read_timeout 3600s;
    }

    location ~ \.php$ {
        return 404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
